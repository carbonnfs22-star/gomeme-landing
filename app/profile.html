<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0A0A0F" />
  <title>GOMEME — Профиль</title>
  <link rel="manifest" href="manifest.json" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,700;9..40,900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/app.css" />
  <style>
    .profile-card {
      margin: 16px;
      padding: 20px;
      border-radius: 18px;
      border: 1px solid var(--border);
      background: var(--card);
    }
    .profile-card h2 { font-size: 20px; margin-bottom: 4px; }
    .profile-card p { color: var(--muted); font-size: 13px; }
    .row {
      display: flex;
      justify-content: space-between;
      padding: 14px 0;
      border-bottom: 1px solid var(--border);
      font-size: 14px;
    }
    .row:last-child { border-bottom: none; }
    .row span:last-child { color: var(--lime); font-weight: 700; }
    .btn-danger {
      display: block;
      width: calc(100% - 32px);
      margin: 16px;
      padding: 14px;
      border-radius: 12px;
      border: 1px solid rgba(255,82,82,0.4);
      background: rgba(255,82,82,0.08);
      color: var(--danger);
      font-weight: 800;
      cursor: pointer;
    }
  </style>
</head>
<body data-page="profile">
  <div class="app-shell">
    <header class="topbar">
      <a class="logo" href="index.html">
        <img src="assets/icon-192.png" alt="" width="32" height="32" />
        GO<span>MEME</span>
      </a>
      <div class="badge">Web</div>
    </header>
    <main class="screen">
      <section class="hero">
        <h1>Профиль</h1>
        <p>Локальный аккаунт в браузере. Позже подключим Supabase и синхронизацию с приложением.</p>
      </section>
      <div class="profile-card">
        <h2>Игрок Web</h2>
        <p id="device-id">—</p>
        <div style="margin-top:16px">
          <div class="row"><span>Поймано</span><span id="p-catches">0</span></div>
          <div class="row"><span>Коллекция</span><span id="p-cards">0</span></div>
          <div class="row"><span>$GOMEME</span><span id="p-coins">0</span></div>
          <div class="row"><span>Версия</span><span>v1.1.a web</span></div>
        </div>
      </div>
      <button class="btn-danger" id="reset">Сбросить прогресс</button>
    </main>
  </div>
  <nav class="tabbar">
    <a class="tab" href="index.html"><span class="ico">🏠</span>Главная</a>
    <a class="tab" href="map.html"><span class="ico">🗺</span>Карта</a>
    <a class="tab" href="collection.html"><span class="ico">🃏</span>Коллекция</a>
    <a class="tab" href="pvp.html"><span class="ico">⚔️</span>PvP</a>
  </nav>
  <script type="module">
    import { loadState } from './js/storage.js';

    const state = loadState();
    document.getElementById('device-id').textContent = state.deviceId;
    document.getElementById('p-catches').textContent = state.catches;
    document.getElementById('p-cards').textContent = state.collection.length;
    document.getElementById('p-coins').textContent = state.coins;

    document.getElementById('reset').onclick = () => {
      if (confirm('Удалить весь прогресс web-версии?')) {
        localStorage.removeItem('gomeme-web-v1');
        location.reload();
      }
    };
  </script>
</body>
</html>
