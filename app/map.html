<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0A0A0F" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>GOMEME — Карта</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,700;9..40,900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/app.css" />
  <style>
    .map-page { padding-bottom: 0; }
    .map-wrap { flex: 1; position: relative; min-height: 0; }
    #map { position: absolute; inset: 0; background: #0b0e14; }
    .leaflet-control-attribution { display: none !important; }
    .hud {
      position: absolute;
      top: max(72px, calc(env(safe-area-inset-top) + 56px));
      left: 12px;
      right: 12px;
      z-index: 500;
      display: flex;
      gap: 8px;
      pointer-events: none;
    }
    .hud-pill {
      pointer-events: auto;
      background: rgba(10, 10, 15, 0.88);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 12px;
      font-weight: 700;
      backdrop-filter: blur(12px);
    }
    .hud-pill.lime { color: var(--lime); border-color: rgba(0,230,118,0.35); }
    .catch-sheet {
      position: fixed;
      left: 0; right: 0; bottom: calc(var(--tab-h) + var(--safe-bottom));
      z-index: 600;
      padding: 12px 16px 16px;
      background: linear-gradient(transparent, rgba(10,10,15,0.95) 30%);
      transform: translateY(120%);
      transition: transform 0.25s ease;
    }
    .catch-sheet.open { transform: translateY(0); }
    .catch-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 16px;
      display: flex;
      gap: 14px;
      align-items: center;
    }
    .catch-card img {
      width: 72px;
      height: 102px;
      object-fit: cover;
      border-radius: 10px;
      border: 2px solid var(--pink);
    }
    .catch-card h3 { font-size: 16px; margin-bottom: 4px; }
    .catch-card p { font-size: 12px; color: var(--muted); }
    .catch-actions { display: flex; gap: 8px; margin-top: 10px; }
    .btn {
      flex: 1;
      border: none;
      border-radius: 12px;
      padding: 12px;
      font-weight: 800;
      font-size: 13px;
      cursor: pointer;
    }
    .btn-pink { background: var(--pink); color: #fff; }
    .btn-ghost { background: var(--bg-elevated); color: var(--text); border: 1px solid var(--border); }
    .loc-btn {
      position: absolute;
      right: 12px;
      bottom: calc(var(--tab-h) + var(--safe-bottom) + 16px);
      z-index: 500;
      width: 44px; height: 44px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: rgba(10,10,15,0.9);
      color: var(--pink);
      font-size: 18px;
      cursor: pointer;
    }
    .toast {
      position: fixed;
      top: max(80px, calc(env(safe-area-inset-top) + 64px));
      left: 50%;
      transform: translateX(-50%) translateY(-20px);
      opacity: 0;
      background: rgba(20,20,31,0.95);
      border: 1px solid var(--border);
      padding: 10px 16px;
      border-radius: 999px;
      font-size: 13px;
      z-index: 700;
      transition: all 0.25s;
      pointer-events: none;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body data-page="map">
  <div class="app-shell map-page">
    <header class="topbar">
      <a class="logo" href="index.html">
        <img src="assets/icon-192.png" alt="" width="32" height="32" />
        GO<span>MEME</span>
      </a>
      <div class="badge" id="gps-status">GPS…</div>
    </header>
    <div class="map-wrap">
      <div id="map"></div>
      <div class="hud">
        <div class="hud-pill" id="spawn-count">0 рядом</div>
        <div class="hud-pill lime" id="near-label">Ищем мемов…</div>
      </div>
      <button class="loc-btn" id="loc-btn" title="Моё местоположение">📍</button>
    </div>
    <div class="catch-sheet" id="catch-sheet">
      <div class="catch-card">
        <img id="catch-img" src="" alt="" />
        <div style="flex:1">
          <h3 id="catch-name">—</h3>
          <p id="catch-meta">—</p>
          <div class="catch-actions">
            <button class="btn btn-pink" id="catch-btn">Поймать!</button>
            <button class="btn btn-ghost" id="catch-skip">Пропустить</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <nav class="tabbar">
    <a class="tab" href="index.html"><span class="ico">🏠</span>Главная</a>
    <a class="tab active" href="map.html"><span class="ico">🗺</span>Карта</a>
    <a class="tab" href="collection.html"><span class="ico">🃏</span>Коллекция</a>
    <a class="tab" href="pvp.html"><span class="ico">⚔️</span>PvP</a>
  </nav>

  <div class="toast" id="toast"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script type="module">
    import { addCatch } from './js/storage.js';

    const RARITIES = ['common','uncommon','rare','epic','legendary'];
    const WEIGHTS = [58, 24, 10, 4, 1];
    const DEMO_MEMES = [
      { slug: 'tralalero-tralala', name: 'Tralalero Tralala', clan: 'Oceanini' },
      { slug: 'bombardiro-crocodilo', name: 'Bombardiro Crocodilo', clan: 'Bombardini' },
      { slug: 'lirili-larila', name: 'Lirilì Larilà', clan: 'Animalini' },
      { slug: 'boneca-ambalabu', name: 'Boneca Ambalabu', clan: 'Animalini' },
      { slug: 'tung-tung-tung-sahur', name: 'Tung Tung Sahur', clan: 'Musichini' },
      { slug: 'cappuccino-assassino', name: 'Cappuccino Assassino', clan: 'Drinkellini' },
    ];
    const CARD_ART = {
      common: 'assets/cards/common.jpg',
      uncommon: 'assets/cards/uncommon.jpg',
      rare: 'assets/cards/rare.jpg',
      epic: 'assets/cards/epic.jpg',
      legendary: 'assets/cards/legendary.jpg',
    };

    function pickRarity() {
      const roll = Math.random() * 100;
      let acc = 0;
      for (let i = 0; i < RARITIES.length; i++) {
        acc += WEIGHTS[i];
        if (roll <= acc) return RARITIES[i];
      }
      return 'common';
    }

    function toast(msg) {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.classList.add('show');
      setTimeout(() => el.classList.remove('show'), 2200);
    }

    function randomOffset(m) {
      const a = Math.random() * Math.PI * 2;
      const d = 80 + Math.random() * 180;
      const dy = (d * Math.cos(a)) / 111111;
      const dx = (d * Math.sin(a)) / (111111 * Math.cos(m[0] * Math.PI / 180));
      return [m[0] + dy, m[1] + dx];
    }

    let map, playerMarker, spawns = [], activeSpawn = null;

    function renderSpawns(center) {
      spawns.forEach(s => map.removeLayer(s.marker));
      spawns = [];
      const count = 2 + Math.floor(Math.random() * 2);
      for (let i = 0; i < count; i++) {
        const pos = randomOffset(center);
        const meme = DEMO_MEMES[Math.floor(Math.random() * DEMO_MEMES.length)];
        const rarity = pickRarity();
        const spawn = { pos, meme, rarity, id: `s-${Date.now()}-${i}` };
        const icon = L.divIcon({
          className: '',
          html: `<div style="width:42px;height:42px;border-radius:50%;border:3px solid #fff;background:linear-gradient(135deg,#ff3d81,#7c5cff);box-shadow:0 4px 16px rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;font-size:18px">🧠</div>`,
          iconSize: [42, 42],
          iconAnchor: [21, 21],
        });
        spawn.marker = L.marker(pos, { icon }).addTo(map);
        spawn.marker.on('click', () => openCatch(spawn));
        spawns.push(spawn);
      }
      document.getElementById('spawn-count').textContent = `${spawns.length} рядом`;
    }

    function openCatch(spawn) {
      activeSpawn = spawn;
      document.getElementById('catch-name').textContent = spawn.meme.name;
      document.getElementById('catch-meta').textContent = `${spawn.rarity.toUpperCase()} · ${spawn.meme.clan}`;
      document.getElementById('catch-img').src = CARD_ART[spawn.rarity] || CARD_ART.common;
      document.getElementById('catch-sheet').classList.add('open');
    }

    function closeCatch() {
      document.getElementById('catch-sheet').classList.remove('open');
      activeSpawn = null;
    }

    document.getElementById('catch-skip').onclick = closeCatch;
    document.getElementById('catch-btn').onclick = () => {
      if (!activeSpawn) return;
      addCatch({ ...activeSpawn.meme, rarity: activeSpawn.rarity });
      map.removeLayer(activeSpawn.marker);
      spawns = spawns.filter(s => s.id !== activeSpawn.id);
      document.getElementById('spawn-count').textContent = `${spawns.length} рядом`;
      toast(`Пойман: ${activeSpawn.meme.name}!`);
      closeCatch();
    };

    function initMap(lat, lng) {
      map = L.map('map', { zoomControl: false }).setView([lat, lng], 16);
      L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
        maxZoom: 19,
      }).addTo(map);
      playerMarker = L.circleMarker([lat, lng], {
        radius: 8,
        color: '#fff',
        fillColor: '#ff3d81',
        fillOpacity: 1,
        weight: 2,
      }).addTo(map);
      renderSpawns([lat, lng]);
      document.getElementById('gps-status').textContent = 'GPS ✓';
      document.getElementById('near-label').textContent = 'Тапни на 🧠';
    }

    function fallbackMoscow() {
      document.getElementById('gps-status').textContent = 'Demo GPS';
      toast('GPS недоступен — демо-карта Москвы');
      initMap(55.7558, 37.6173);
    }

    document.getElementById('loc-btn').onclick = () => {
      if (!map || !playerMarker) return;
      navigator.geolocation.getCurrentPosition(
        ({ coords }) => {
          const { latitude, longitude } = coords;
          map.setView([latitude, longitude], 16);
          playerMarker.setLatLng([latitude, longitude]);
          renderSpawns([latitude, longitude]);
        },
        () => toast('Не удалось получить GPS'),
        { enableHighAccuracy: true, timeout: 8000 },
      );
    };

    if (navigator.geolocation) {
      navigator.geolocation.getCurrentPosition(
        ({ coords }) => initMap(coords.latitude, coords.longitude),
        fallbackMoscow,
        { enableHighAccuracy: true, timeout: 10000 },
      );
    } else {
      fallbackMoscow();
    }
  </script>
</body>
</html>
