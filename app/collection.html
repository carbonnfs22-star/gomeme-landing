<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0A0A0F" />
  <title>GOMEME — Коллекция</title>
  <link rel="manifest" href="manifest.json" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,700;9..40,900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/app.css" />
  <style>
    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      padding: 0 16px 24px;
    }
    .card-item {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
    }
    .card-item img {
      width: 100%;
      aspect-ratio: 9/16;
      object-fit: cover;
      display: block;
    }
    .card-item .info { padding: 10px 12px 12px; }
    .card-item h3 { font-size: 13px; margin-bottom: 4px; line-height: 1.3; }
    .card-item p { font-size: 11px; color: var(--muted); }
    .rarity {
      display: inline-block;
      margin-top: 6px;
      padding: 2px 8px;
      border-radius: 6px;
      font-size: 10px;
      font-weight: 800;
      text-transform: uppercase;
    }
    .r-common { background: rgba(138,138,147,.2); color: #9aaeb0; }
    .r-uncommon { background: rgba(0,230,118,.15); color: #00e676; }
    .r-rare { background: rgba(1,177,226,.15); color: #01b1e2; }
    .r-epic { background: rgba(255,61,129,.15); color: #ff3d81; }
    .r-legendary { background: rgba(255,179,0,.15); color: #ffb300; }
    .empty {
      margin: 40px 16px;
      text-align: center;
      padding: 32px 20px;
      border: 1px dashed var(--border);
      border-radius: 18px;
      color: var(--muted);
    }
    .empty a { color: var(--pink); font-weight: 700; }
  </style>
</head>
<body data-page="collection">
  <div class="app-shell">
    <header class="topbar">
      <a class="logo" href="index.html">
        <img src="assets/icon-192.png" alt="" width="32" height="32" />
        GO<span>MEME</span>
      </a>
      <div class="badge" id="count-badge">0 карт</div>
    </header>
    <main class="screen">
      <section class="hero" style="padding-bottom:0">
        <h1>Brainrotdex</h1>
        <p>Карты, которых поймал в web-версии. Данные хранятся локально в браузере.</p>
      </section>
      <div id="grid" class="grid"></div>
      <div id="empty" class="empty" hidden>
        Пока пусто. <a href="map.html">Иди на карту</a> и поймай первого мема.
      </div>
    </main>
  </div>
  <nav class="tabbar">
    <a class="tab" href="index.html"><span class="ico">🏠</span>Главная</a>
    <a class="tab" href="map.html"><span class="ico">🗺</span>Карта</a>
    <a class="tab active" href="collection.html"><span class="ico">🃏</span>Коллекция</a>
    <a class="tab" href="pvp.html"><span class="ico">⚔️</span>PvP</a>
  </nav>
  <script type="module">
    import { loadState } from './js/storage.js';

    const ART = {
      common: 'assets/cards/common.jpg',
      uncommon: 'assets/cards/uncommon.jpg',
      rare: 'assets/cards/rare.jpg',
      epic: 'assets/cards/epic.jpg',
      legendary: 'assets/cards/legendary.jpg',
    };

    const state = loadState();
    const grid = document.getElementById('grid');
    const empty = document.getElementById('empty');
    document.getElementById('count-badge').textContent = `${state.collection.length} карт`;

    if (!state.collection.length) {
      empty.hidden = false;
    } else {
      grid.innerHTML = state.collection.map((c) => `
        <article class="card-item">
          <img src="${ART[c.rarity] || ART.common}" alt="${c.name}" loading="lazy" />
          <div class="info">
            <h3>${c.name}</h3>
            <p>${c.clan || '—'}</p>
            <span class="rarity r-${c.rarity}">${c.rarity}</span>
          </div>
        </article>
      `).join('');
    }
  </script>
</body>
</html>
